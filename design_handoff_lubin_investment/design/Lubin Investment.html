<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lubin Investment — Analyse fondamentale, sans le bruit</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ---- Responsive overrides (mobile : variante de la direction retenue) ---- */
    @media (max-width: 980px) {
      .hero-copy h1 { font-size: 40px !important; }
      .wrap .hero-art { display: none; }
      .scorecard { grid-template-columns: 1fr !important; gap: 18px !important; text-align: left; }
    }
    @media (max-width: 880px) {
      .earnings-grid { grid-template-columns: 1fr !important; }
      .val-grid { grid-template-columns: 1fr !important; }
      .val-grid > div:first-child { border-right: none !important; border-bottom: 1px solid var(--line); }
      .steps-grid { grid-template-columns: 1fr !important; gap: 28px !important; }
      .auth-grid { grid-template-columns: 1fr !important; }
      .auth-aside { display: none !important; }
      .footer-row { flex-direction: column; gap: 14px; align-items: flex-start; }
      .hero-copy h1 { font-size: 34px !important; }
      section .wrap [style*="grid-template-columns: 1.05fr"],
      .wrap > [style*="grid-template-columns: 1.05fr"] { grid-template-columns: 1fr !important; }
    }
    @media (max-width: 640px) {
      .scorecard { padding: 18px !important; }
    }
  </style>

  <!-- pin React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- hooks globaux partagés entre les modules babel (chaque script a son propre scope) -->
  <script>
    window.useState = React.useState;
    window.useEffect = React.useEffect;
    window.useRef = React.useRef;
    window.useMemo = React.useMemo;
    window.useCallback = React.useCallback;
    window.useLayoutEffect = React.useLayoutEffect;
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="charts.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="screen-home.jsx"></script>
  <script type="text/babel" src="screen-analyser.jsx"></script>
  <script type="text/babel" src="screen-tables.jsx"></script>
  <script type="text/babel" src="screen-auth.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
