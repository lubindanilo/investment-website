name: E2E (Playwright, site live)

# Suite E2E déterministe contre le site en prod. Gate de régression rapide + gratuit.
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'   # check quotidien 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      # Pas de `version:` ici : pnpm/action-setup lit `packageManager` dans package.json
      # (pnpm@11.x). Figer une version differente (ex. 9) fait echouer l'action avec
      # ERR_PNPM_BAD_PM_VERSION avant meme d'installer les deps.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
