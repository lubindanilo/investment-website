name: Content lint (articles : tirets + ordre des déclarations)

# Garde-fous déterministes sur les fichiers d'articles. Deux invariants dans le MÊME job
# `no-dashes` (required check de la protection de branche `main`), donc les deux bloquent
# l'auto-merge des PR `seo/*` :
#   1. AUCUN tiret long (—) ni moyen (–) (préférence éditoriale Lubin : deux-points/virgule).
#   2. `export const ARTICLES = [...]` déclaré APRÈS toutes ses consts (sinon TDZ =>
#      crash de la fonction Vercel à l'import, HTTP 500 sur tout le site : incident 2026-07-15).
#
# Tourne sur TOUTES les PRs (pas de filtre de chemin) pour toujours reporter un statut.
on:
  pull_request:
  workflow_dispatch: {}

jobs:
  no-dashes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Interdire les tirets longs/moyens dans les articles
        run: |
          FILES="packages/shared/src/articles.ts apps/api/src/data/articles.ts"
          if grep -nP '[\x{2014}\x{2013}]' $FILES; then
            echo "::error::Tiret long (—) ou moyen (–) détecté dans un article. Remplace par ':' , ',' ou coupe la phrase."
            exit 1
          fi
          echo "✅ Aucun tiret long/moyen dans les articles."
      - name: Vérifier l'ordre des déclarations d'articles (anti-TDZ)
        run: node scripts/check-articles-order.mjs
